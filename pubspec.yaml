name: scout_logger_plus
description: Flutter client SDK for scout-logger — bridge apps to the dashboard via ingest API.
version: 1.0.0
publish_to: none

environment:
  sdk: ^3.5.0
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  battery_plus: ^6.2.1
  connectivity_plus: ^6.1.4
  devicelocale: ^0.8.1
  device_info_plus: ^11.5.0
  dio: ^5.9.0
  flutter_dotenv: ^5.2.1
  go_router: '>=14.6.2 <18.0.0'
  meta: ^1.16.0
  package_info_plus: '>=8.3.0 <11.0.0'
  scout_models:
    git:
      url: git@github.com:alrashidi-approc/scout-logger.git
      path: packages/scout_models
      ref: main
  uuid: ^4.5.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
